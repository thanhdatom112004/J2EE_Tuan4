<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head></head>
<body>
<th:block th:fragment="head-links">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="BigSchool - Home page with courses and search functionality">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</th:block>

<nav th:fragment="navbar" class="navbar navbar-expand navbar-dark bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid">
        <div style="padding-left: 24px" class="d-flex align-items-center gap-3">
            <a class="navbar-brand" th:href="@{/products}">Home</a>
            <a class="navbar-brand" th:href="@{/products/create}">Products</a>
        </div>
        <form class="d-flex" role="search" th:action="@{/home/search}" method="get">
            <input class="form-control me-2" type="search" name="q" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
    </div>
</nav>

<div th:fragment="footer" class="card-footer text-center mt-4">
    <hr/>
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</th:block>
</body>
</html>
